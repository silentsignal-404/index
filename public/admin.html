<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Signal - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --base: #1e1e2e;
            --mantle: #181825;
            --surface: #313244;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --blue: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--base);
            color: var(--text);
            line-height: 1.6;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-form {
            background: var(--surface);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            color: var(--blue);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--subtext);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--mantle);
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue);
        }

        .login-btn {
            width: 100%;
            background: var(--blue);
            color: var(--base);
            border: none;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .error-message {
            background: var(--red);
            color: var(--base);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .admin-panel {
            display: none;
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface);
        }

        .admin-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            color: var(--blue);
        }

        .logout-btn {
            background: var(--red);
            color: var(--base);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .messages-section {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'JetBrains Mono', monospace;
            color: var(--blue);
            margin-bottom: 1rem;
        }

        .message-item {
            background: var(--mantle);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--blue);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .message-name {
            font-weight: 600;
            color: var(--blue);
        }

        .message-date {
            color: var(--subtext);
            font-size: 0.9rem;
        }

        .message-email {
            color: var(--subtext);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .message-text {
            line-height: 1.6;
        }

        .no-messages {
            text-align: center;
            color: var(--subtext);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <form id="loginForm" class="login-form">
            <h2 class="login-title">Silent Signal Admin</h2>
            <div id="loginError" class="error-message"></div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Access Admin Panel</button>
        </form>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1 class="admin-title">Silent Signal Admin</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="messages-section">
            <h2 class="section-title">Contact Messages</h2>
            <div id="messagesContainer">
                <div class="no-messages">Loading messages...</div>
            </div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('adminToken');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                showAdminPanel();
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showAdminPanel();
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });

        function showAdminPanel() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadMessages();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        async function loadMessages() {
            try {
                const response = await fetch('/api/admin/messages', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="no-messages">No messages received yet.</div>';
                    return;
                }
                
                container.innerHTML = messages.map(message => `
                    <div class="message-item">
                        <div class="message-header">
                            <div class="message-name">${message.name}</div>
                            <div class="message-date">${new Date(message.created_at).toLocaleDateString()}</div>
                        </div>
                        <div class="message-email">${message.email}</div>
                        <div class="message-text">${message.message}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
    </script>
</body>
</html>
