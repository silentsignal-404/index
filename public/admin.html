<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Signal - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --base: #1e1e2e;
            --mantle: #181825;
            --surface: #313244;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --blue: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--base);
            color: var(--text);
            line-height: 1.6;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-form {
            background: var(--surface);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            color: var(--blue);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--subtext);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--mantle);
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue);
        }

        .login-btn {
            width: 100%;
            background: var(--blue);
            color: var(--base);
            border: none;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .error-message {
            background: var(--red);
            color: var(--base);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .admin-panel {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface);
        }

        .admin-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            color: var(--blue);
        }

        .logout-btn {
            background: var(--red);
            color: var(--base);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .admin-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--surface);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--subtext);
            padding: 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        .nav-btn:hover {
            color: var(--blue);
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'JetBrains Mono', monospace;
            color: var(--blue);
            margin: 0;
        }

        .add-btn {
            background: var(--green);
            color: var(--base);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .item-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--blue);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .item-title {
            font-weight: 600;
            color: var(--blue);
            margin: 0;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn {
            background: var(--blue);
            color: var(--base);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn {
            background: var(--red);
            color: var(--base);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .form-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .form-content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-content h3 {
            color: var(--blue);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--subtext);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: var(--mantle);
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .form-actions button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .form-actions button[type="submit"] {
            background: var(--green);
            color: var(--base);
        }

        .form-actions button[type="button"] {
            background: var(--surface);
            color: var(--text);
            border: 1px solid #333;
        }

        .skill-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .skill-item input {
            flex: 1;
        }

        .skill-item input[type="number"] {
            width: 80px;
            flex: none;
        }

        .remove-skill {
            background: var(--red);
            color: var(--base);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .messages-section {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .message-item {
            background: var(--mantle);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--blue);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .message-name {
            font-weight: 600;
            color: var(--blue);
        }

        .message-date {
            color: var(--subtext);
            font-size: 0.9rem;
        }

        .message-email {
            color: var(--subtext);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .message-text {
            line-height: 1.6;
        }

        .no-messages {
            text-align: center;
            color: var(--subtext);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <form id="loginForm" class="login-form">
            <h2 class="login-title">Silent Signal Admin</h2>
            <div id="loginError" class="error-message"></div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Access Admin Panel</button>
        </form>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1 class="admin-title">Silent Signal Admin</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Navigation Tabs -->
        <div class="admin-nav">
            <button class="nav-btn active" onclick="showSection('members')">Operators</button>
            <button class="nav-btn" onclick="showSection('achievements')">Operations</button>
            <button class="nav-btn" onclick="showSection('timeline')">Timeline</button>
            <button class="nav-btn" onclick="showSection('philosophy')">Philosophy</button>
            <button class="nav-btn" onclick="showSection('messages')">Messages</button>
        </div>

        <!-- Members Section -->
        <div id="membersSection" class="admin-section active">
            <div class="section-header">
                <h2 class="section-title">Team Members</h2>
                <button class="add-btn" onclick="showAddMemberForm()">Add Member</button>
            </div>
            <div id="membersContainer">Loading...</div>
            
            <!-- Add/Edit Member Form -->
            <div id="memberForm" class="form-modal" style="display: none;">
                <div class="form-content">
                    <h3 id="memberFormTitle">Add Member</h3>
                    <form id="memberFormData">
                        <input type="hidden" id="memberId">
                        <div class="form-group">
                            <label>Name:</label>
                            <input type="text" id="memberName" required>
                        </div>
                        <div class="form-group">
                            <label>Alias:</label>
                            <input type="text" id="memberAlias">
                        </div>
                        <div class="form-group">
                            <label>Role:</label>
                            <input type="text" id="memberRole" required>
                        </div>
                        <div class="form-group">
                            <label>Description:</label>
                            <textarea id="memberDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Avatar Letter:</label>
                            <input type="text" id="memberAvatar" maxlength="1">
                        </div>
                        <div id="skillsContainer">
                            <label>Skills:</label>
                            <div id="skillsList"></div>
                            <button type="button" onclick="addSkill()">Add Skill</button>
                        </div>
                        <div class="form-actions">
                            <button type="submit">Save</button>
                            <button type="button" onclick="closeMemberForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Achievements Section -->
        <div id="achievementsSection" class="admin-section">
            <div class="section-header">
                <h2 class="section-title">Achievements</h2>
                <button class="add-btn" onclick="showAddAchievementForm()">Add Achievement</button>
            </div>
            <div id="achievementsContainer">Loading...</div>
            
            <!-- Add/Edit Achievement Form -->
            <div id="achievementForm" class="form-modal" style="display: none;">
                <div class="form-content">
                    <h3 id="achievementFormTitle">Add Achievement</h3>
                    <form id="achievementFormData">
                        <input type="hidden" id="achievementId">
                        <div class="form-group">
                            <label>CTF Name:</label>
                            <input type="text" id="achievementName" required>
                        </div>
                        <div class="form-group">
                            <label>Rank:</label>
                            <input type="text" id="achievementRank" required>
                        </div>
                        <div class="form-group">
                            <label>Year:</label>
                            <input type="text" id="achievementYear" required>
                        </div>
                        <div class="form-group">
                            <label>Insight:</label>
                            <textarea id="achievementInsight" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Signal Strength (1-4):</label>
                            <input type="number" id="achievementSignal" min="1" max="4" value="3">
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="achievementActive"> Currently Active
                            </label>
                        </div>
                        <div class="form-actions">
                            <button type="submit">Save</button>
                            <button type="button" onclick="closeAchievementForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Timeline Section -->
        <div id="timelineSection" class="admin-section">
            <div class="section-header">
                <h2 class="section-title">Timeline Events</h2>
                <button class="add-btn" onclick="showAddTimelineForm()">Add Event</button>
            </div>
            <div id="timelineContainer">Loading...</div>
            
            <!-- Add/Edit Timeline Form -->
            <div id="timelineForm" class="form-modal" style="display: none;">
                <div class="form-content">
                    <h3 id="timelineFormTitle">Add Timeline Event</h3>
                    <form id="timelineFormData">
                        <input type="hidden" id="timelineId">
                        <div class="form-group">
                            <label>Date:</label>
                            <input type="text" id="timelineDate" required>
                        </div>
                        <div class="form-group">
                            <label>Title:</label>
                            <input type="text" id="timelineTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Result:</label>
                            <input type="text" id="timelineResult" required>
                        </div>
                        <div class="form-group">
                            <label>Learning:</label>
                            <textarea id="timelineLearning" rows="3"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit">Save</button>
                            <button type="button" onclick="closeTimelineForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Philosophy Section -->
        <div id="philosophySection" class="admin-section">
            <div class="section-header">
                <h2 class="section-title">Philosophy Quotes</h2>
                <button class="add-btn" onclick="showAddPhilosophyForm()">Add Quote</button>
            </div>
            <div id="philosophyContainer">Loading...</div>
            
            <!-- Add/Edit Philosophy Form -->
            <div id="philosophyForm" class="form-modal" style="display: none;">
                <div class="form-content">
                    <h3 id="philosophyFormTitle">Add Philosophy Quote</h3>
                    <form id="philosophyFormData">
                        <input type="hidden" id="philosophyId">
                        <div class="form-group">
                            <label>Quote:</label>
                            <textarea id="philosophyQuote" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Order:</label>
                            <input type="number" id="philosophyOrder" value="0">
                        </div>
                        <div class="form-actions">
                            <button type="submit">Save</button>
                            <button type="button" onclick="closePhilosophyForm()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Messages Section -->
        <div id="messagesSection" class="admin-section">
            <h2 class="section-title">Contact Messages</h2>
            <div id="messagesContainer">
                <div class="no-messages">Loading messages...</div>
            </div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('adminToken');
        let currentSection = 'members';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                showAdminPanel();
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showAdminPanel();
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });

        function showAdminPanel() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            showSection('members');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        // Section Navigation
        function showSection(section) {
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update sections
            document.querySelectorAll('.admin-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            
            currentSection = section;
            
            // Load data for the section
            switch(section) {
                case 'members':
                    loadMembers();
                    break;
                case 'achievements':
                    loadAchievements();
                    break;
                case 'timeline':
                    loadTimeline();
                    break;
                case 'philosophy':
                    loadPhilosophy();
                    break;
                case 'messages':
                    loadMessages();
                    break;
            }
        }

        // Members Management
        async function loadMembers() {
            try {
                const response = await fetch('/api/admin/members', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const members = await response.json();
                const container = document.getElementById('membersContainer');
                
                if (members.length === 0) {
                    container.innerHTML = '<div class="no-messages">No members found.</div>';
                    return;
                }
                
                container.innerHTML = members.map(member => `
                    <div class="item-card">
                        <div class="item-header">
                            <h3 class="item-title">${member.name}${member.alias ? ` (${member.alias})` : ''}</h3>
                            <div class="item-actions">
                                <button class="edit-btn" onclick="editMember(${member.id})">Edit</button>
                                <button class="delete-btn" onclick="deleteMember(${member.id})">Delete</button>
                            </div>
                        </div>
                        <p><strong>Role:</strong> ${member.role}</p>
                        <p><strong>Description:</strong> ${member.description || 'No description'}</p>
                        <p><strong>Skills:</strong> ${member.skills.map(s => s.name).join(', ')}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }

        function showAddMemberForm() {
            document.getElementById('memberFormTitle').textContent = 'Add Member';
            document.getElementById('memberFormData').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('skillsList').innerHTML = '';
            addSkill(); // Add one empty skill field
            document.getElementById('memberForm').style.display = 'flex';
        }

        function closeMemberForm() {
            document.getElementById('memberForm').style.display = 'none';
        }

        async function editMember(id) {
            try {
                const response = await fetch('/api/admin/members', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const members = await response.json();
                const member = members.find(m => m.id === id);
                
                if (member) {
                    document.getElementById('memberFormTitle').textContent = 'Edit Member';
                    document.getElementById('memberId').value = member.id;
                    document.getElementById('memberName').value = member.name;
                    document.getElementById('memberAlias').value = member.alias || '';
                    document.getElementById('memberRole').value = member.role;
                    document.getElementById('memberDescription').value = member.description || '';
                    document.getElementById('memberAvatar').value = member.avatar_letter || '';
                    
                    // Load skills
                    const skillsList = document.getElementById('skillsList');
                    skillsList.innerHTML = '';
                    member.skills.forEach(skill => {
                        addSkill(skill.name, skill.level);
                    });
                    
                    document.getElementById('memberForm').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error loading member:', error);
            }
        }

        async function deleteMember(id) {
            if (confirm('Are you sure you want to delete this member?')) {
                try {
                    const response = await fetch(`/api/admin/members/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    
                    if (response.ok) {
                        loadMembers();
                    }
                } catch (error) {
                    console.error('Error deleting member:', error);
                }
            }
        }

        function addSkill(name = '', level = 90) {
            const skillsList = document.getElementById('skillsList');
            const skillDiv = document.createElement('div');
            skillDiv.className = 'skill-item';
            skillDiv.innerHTML = `
                <input type="text" placeholder="Skill name" value="${name}" required>
                <input type="number" placeholder="Level" value="${level}" min="1" max="100" required>
                <button type="button" class="remove-skill" onclick="this.parentElement.remove()">Remove</button>
            `;
            skillsList.appendChild(skillDiv);
        }

        // Member form submission
        document.getElementById('memberFormData').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('memberId').value;
            const skills = [];
            
            document.querySelectorAll('.skill-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    skills.push({
                        name: inputs[0].value,
                        level: parseInt(inputs[1].value)
                    });
                }
            });
            
            const memberData = {
                name: document.getElementById('memberName').value,
                alias: document.getElementById('memberAlias').value,
                role: document.getElementById('memberRole').value,
                description: document.getElementById('memberDescription').value,
                avatar_letter: document.getElementById('memberAvatar').value,
                skills: skills
            };
            
            try {
                const url = id ? `/api/admin/members/${id}` : '/api/admin/members';
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(memberData)
                });
                
                if (response.ok) {
                    closeMemberForm();
                    loadMembers();
                }
            } catch (error) {
                console.error('Error saving member:', error);
            }
        });

        // Achievements Management
        async function loadAchievements() {
            try {
                const response = await fetch('/api/admin/achievements', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const achievements = await response.json();
                const container = document.getElementById('achievementsContainer');
                
                if (achievements.length === 0) {
                    container.innerHTML = '<div class="no-messages">No achievements found.</div>';
                    return;
                }
                
                container.innerHTML = achievements.map(achievement => `
                    <div class="item-card">
                        <div class="item-header">
                            <h3 class="item-title">${achievement.name}</h3>
                            <div class="item-actions">
                                <button class="edit-btn" onclick="editAchievement(${achievement.id})">Edit</button>
                                <button class="delete-btn" onclick="deleteAchievement(${achievement.id})">Delete</button>

        // Messages (existing functionality)
        async function loadMessages() {
            try {
                const response = await fetch('/api/admin/messages', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="no-messages">No messages received yet.</div>';
                    return;
                }
                
                container.innerHTML = messages.map(message => `
                    <div class="message-item">
                        <div class="message-header">
                            <div class="message-name">${message.name}</div>
                            <div class="message-date">${new Date(message.created_at).toLocaleDateString()}</div>
                        </div>
                        <div class="message-email">${message.email}</div>
                        <div class="message-text">${message.message}</div>
                        <button class="delete-btn" onclick="deleteMessage(${message.id})" style="margin-top: 1rem;">Delete</button>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this message?')) {
                try {
                    const response = await fetch(`/api/admin/messages/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    
                    if (response.ok) {
                        loadMessages();
                    }

                    console.error('Error deleting message:', error);
                }
            }
