services:
  - type: web
    name: silent-signal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: silent-signal-secret-production-2026
      - key: PORT
        value: 10000
    healthCheckPath: /health